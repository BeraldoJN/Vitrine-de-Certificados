<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Certificados | Portfólio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Minha Vitrine de Certificados</h1>
        <p>Evolução contínua em Desenvolvimento Full Stack</p>
    </header>

    <main class="container">
        <section class="grid-certificados">
            
            <div class="card">
                <div class="foto-certificado">
                    <img src="img/MySQL.png" alt="MySQL" class="cert-img">
                </div>
                <div class="info">
                    <h3>Banco de Dados e MySQl</h3>
                    <p>Curso em Vídeo</p>
                </div>
            </div>

            <div class="card">
                <div class="foto-certificado">
                    <img src="img/introducao_ao_desenvolvimento_de_software.png" alt="Introdução ao Desenvolvimento de Softwares" class="cert-img">
                </div>
                <div class="info">
                    <h3>Desenvolvimento de Softwares</h3>
                    <p>Digital Innovation One</p>
                </div>
            </div>

        </section>
    </main>

    <footer>
        <p>Conecte-se comigo no <a href="https://github.com/SEU_USUARIO">GitHub</a></p>
    </footer>

    <dialog id="modal-zoom">
        <button id="close-modal">&times;</button>
        <img src="" alt="Zoom do Certificado" id="modal-img">
    </dialog>

    <script src="script.js"></script>

</body>
</html>
