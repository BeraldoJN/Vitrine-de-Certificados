<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Certificados | Portfólio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header>
        <h1>Minha Vitrine de Certificados</h1>
        <p>Evolução contínua em Desenvolvimento Back-End</p>
    </header>

    <main class="container">
        <section class="grid-certificados">
            
            <div class="card">
                <div class="foto-certificado">
                    <img src="img/MySQL.png" alt="MySQL" class="cert-img">
                </div>
                <div class="info">
                    <h3>Banco de Dados e MySQl</h3>
                    <p>Curso em Vídeo</p>
                </div>
            </div>

            <div class="card">
                <div class="foto-certificado">
                    <img src="img/introducao_ao_desenvolvimento_de_software.png" alt="Introdução ao Desenvolvimento de Softwares" class="cert-img">
                </div>
                <div class="info">
                    <h3>Desenvolvimento de Softwares</h3>
                    <p>Digital Innovation One</p>
                </div>
            </div>

            <div class="card">
                <div class="foto-certificado">
                    <img src="img/Captura de tela 2026-03-10 133821.png" alt="Introdução a programação e pensamento computacional" class="cert-img">
                </div>
                <div class="info">
                    <h3>Introdução a Programação e Pensamento Computacional</h3>
                    <p>Digital Innovation One</p>
                </div>
            </div>

        </section>
    </main>

 <footer class="footer">
    <div class="footer-links">
        <a href="https://github.com/BeraldoJN" target="_blank" aria-label="GitHub">
            <i class="fab fa-github"></i>
        </a>
        <a href="https://www.linkedin.com/in/jose-beraldo-418414286/" target="_blank" aria-label="LinkedIn">
            <i class="fab fa-linkedin-in"></i>
        </a>
    </div>
    <p>&copy; 2026 José Beraldo Neto</p>
</footer>

    <dialog id="modal-zoom">
        <button id="close-modal">&times;</button>
        <img src="" alt="Zoom do Certificado" id="modal-img">
    </dialog>

    <script src="script.js"></script>

</body>
</html>
